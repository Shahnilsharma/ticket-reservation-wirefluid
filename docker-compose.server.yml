services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: wirefluid-backend:latest
    restart: unless-stopped
    env_file:
      - ./.env.server
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 4000) + '/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
